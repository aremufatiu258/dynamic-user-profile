<!DOCTYPE html>
<html>
   <head>
      <title>Teamable</title>
      <link rel="stylesheet" href="style.css">
      <meta charset="utf-8" />
   </head>

   <body>
      <div id="display-view">
         <h1>User profile</h1>
         <img class="profile-img" src="images/ball.jpeg">

         <span>Name: </span>
         <b id="name">Aremu Fatiu</b>
         <hr />

         <span>Email: </span>
         <b id="email">aremu.fatiu@example.com</b>
         <hr />

         <span>Interests: </span>
         <b id="interests">coding</b>
         <hr />

         <button onclick="handleEditProfile()">Edit Profile</button>
      </div>

      <div id="edit-view">
         <h1>User profile</h1>
         <img class="profile-img" src="images/ball.jpeg">

         <span>Name: </span>
         <input id="ipt-name" type="text" placeholder="Aremu Fatiu"/>
         <hr />

         <span>Email: </span>
         <input id="ipt-email" type="email" placeholder="aremu.fatiu@example.com"/>
         <hr />

         <span>Interests: </span>
         <input id="ipt-interests" type="text" placeholder="coding"/>
         <hr />
         
         <button onclick="handleUpdateProfile()">Update Profile</button>
      </div> 
      
      <script src="https://unpkg.com/validator@latest/validator.min.js"></script>
      <script src="app.js"></script>
   </body>
</html>
