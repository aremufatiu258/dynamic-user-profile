<!DOCTYPE html>
<html>
   <!-- node_modules/validator/validator.min.js -->
   <head>
      <title>Teamable</title>
      <link rel="stylesheet" href="style.css">
      <script src="app.js"></script>
      <meta charset="utf-8" />
      <script src="https://unpkg.com/validator@latest/validator.min.js"></script>
      <!-- <link rel="stylesheet" href="node_modules/Datepicker.js/dist/css/datepicker.material.css">
      <script src="node_modules/Datepicker.js/dist/datepicker.js"></script> -->
   </head>

   <body>
      <div id="display-view">
         <h1>User profile</h1>
         <img id="profile-img" src="../images/ball.jpeg">

         <span>Name: </span>
         <b id="name">Aremu Fatiu</b>
         <hr />

         <span>Email: </span>
         <b id="email">aremu.fatiu@example.com</b>
         <hr />

         <span>Interests: </span>
         <b id="interests">coding</b>
         <hr />

         <button onclick="handleEditProfile()">Edit Profile</button>
      </div>

      <div id="edit-view">
         <h1>User profile</h1>
         <img id="profile-img" src="../images/ball.jpeg">

         <span>Name: </span>
         <input id="ipt-name" type="text" placeholder="Aremu Fatiu"/>
         <hr />

         <span>Email: </span>
         <input id="ipt-email" type="email" placeholder="aremu.fatiu@example.com"/>
         <hr />

         <span>Interests: </span>
         <input id="ipt-interests" type="text" placeholder="coding"/>
         <hr />

         <!-- <span>Birthday date: </span>
         <input type="text" id="birthday">
         <hr /> -->

         <button class="update-btn" onclick="handleUpdateProfile()">Update Profile</button>
      </div> 
   </body>
</html>
